name: Auto-Commit GitHub Configuration Changes

on:
  schedule:
    - cron: '0 */2 * * *'  # Run every 2 hours
  workflow_dispatch:  # Allow manual trigger

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for uncommitted changes in .github
        id: check-changes
        run: |
          # Check if there are any changes in .github directory
          if git status --short | grep -q "^\s*[AM].*\.github/"; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and create PR
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          # Set git config
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Create a unique branch name with timestamp
          TIMESTAMP=$(date +%s)
          BRANCH_NAME="auto-commit-github-changes-${TIMESTAMP}"
          
          # Create and checkout new branch
          git checkout -b $BRANCH_NAME
          
          # Stage and commit .github changes
          git add .github/
          git commit -m "Update .github configuration files"
          
          # Push branch
          git push origin $BRANCH_NAME
          
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Create Pull Request
        id: create-pr
        if: steps.check-changes.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { BRANCH_NAME } = process.env;
            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: BRANCH_NAME,
              base: 'main',
              title: '[Auto] Update .github configuration files',
              body: 'Automated commit of .github directory changes.\n\nThis PR was created by the auto-commit workflow.',
              labels: ['auto-merge']
            });
            
            console.log('PR created:', pr.data.number);
            core.setOutput('pr_number', pr.data.number);

      - name: Enable auto-merge
        if: steps.check-changes.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ steps.create-pr.outputs.pr_number }};
            
            try {
              await github.rest.pulls.enableAutoMerge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                merge_method: 'merge'
              });
              console.log('Auto-merge enabled for PR', prNumber);
            } catch (error) {
              console.log('Auto-merge not available or failed:', error.message);
              // Fallback: merge the PR immediately
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                merge_method: 'merge'
              });
              console.log('PR merged immediately');
            }
